name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Required by actions/deploy-pages on top of the default GITHUB_TOKEN scopes.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent runs deploying stale builds; only the latest push to main wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install mkdocs toolchain
        run: pip install -r docs/requirements.txt

      # Dokka writes aggregated HTML into build/dokka/html and copyDokkaToDocs
      # mirrors it into docs/api/ where mkdocs picks it up.
      - name: Generate Dokka API reference
        run: ./gradlew copyDokkaToDocs --no-daemon

      - name: Validate docs structure (docs/check.py)
        run: python3 docs/check.py

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
