name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Required by actions/deploy-pages on top of the default GITHUB_TOKEN scopes.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent runs deploying stale builds; only the latest push to main wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # mise pins JDK, gradle, python, and the rest of the toolchain (see
      # /mise.toml). setup-gradle stays for its build / dependency cache.
      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Pinned at v5 rather than v6: v6 moved caching to a commercially-
      # licensed component. v5 keeps the freely-licensed caching and runs
      # on Node 24. See .github/workflows/ci.yml for the full rationale.
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Install mkdocs toolchain
        run: mise run docs:install

      # Dokka writes aggregated HTML into build/dokka/html and copyDokkaToDocs
      # mirrors it into docs/api/ where mkdocs picks it up.
      - name: Generate Dokka API reference
        run: mise run docs:dokka

      - name: Validate docs structure
        run: mise run docs:check

      # docs:build runs docs:dokka + docs:check via its dependency chain;
      # we ran them as separate steps above for GH Actions log readability,
      # so call docs:build:only here to skip the duplicate work.
      - name: Build site
        run: mise run docs:build:only

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
