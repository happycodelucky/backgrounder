name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix (e.g. 0.2.0)
        required: true
        type: string
      notes:
        description: Release notes for GitHub Releases (optional; auto-generated if empty)
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: echo "TAG=v${INPUT_VERSION}" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Build the KMMBridge-consumable XCFramework (CLAUDE.md §9). KMMBridge
      # itself isn't fully wired in v1; that lands when we cut 0.2.0 with
      # Maven publish. For now we ship the XCFramework as a GitHub Release
      # asset so iOS / macOS consumers can drop it in directly.
      - name: Build release artifacts
        run: |
          ./gradlew :shared:assembleBackgrounderXCFramework \
            -Pversion=${{ inputs.version }} --no-daemon

      # Zip the XCFramework so GitHub Releases serves a single file. Consumers
      # unzip and consume the resulting Backgrounder.xcframework directly.
      - name: Package XCFramework
        run: |
          cd shared/build/XCFrameworks/release
          zip -ry "Backgrounder-${{ inputs.version }}.xcframework.zip" Backgrounder.xcframework

      - name: Compute archive checksums
        run: |
          cd shared/build/XCFrameworks/release
          shasum -a 256 Backgrounder-*.xcframework.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create and push tag
        env:
          TAG: ${{ env.TAG }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag -a "$TAG" -m "Release $TAG"
          fi
          if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on origin."
          else
            git push origin "$TAG"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backgrounder-release-${{ env.TAG }}
          path: |
            shared/build/XCFrameworks/release/Backgrounder-*.xcframework.zip
            shared/build/XCFrameworks/release/SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ env.TAG }}
          NOTES: ${{ inputs.notes }}
        run: |
          ASSETS=(shared/build/XCFrameworks/release/Backgrounder-*.xcframework.zip
                  shared/build/XCFrameworks/release/SHA256SUMS.txt)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          elif [[ -n "$NOTES" ]]; then
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --generate-notes
          fi
