name: Release

# Conservative release pipeline: build the XCFramework, zip it, attach to a
# GitHub Release. KMMBridge / Maven Central publishing isn't wired in v1 —
# when that lands (cut against 0.2.0), this workflow grows the Maven Central
# steps and the GitHub Release becomes a thin tag-and-notes wrapper.
# See reachable's release.yml for the Maven Central template.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix (e.g. 0.2.0)
        required: true
        type: string
      notes:
        description: Release notes for GitHub Releases (optional; auto-generated if empty)
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so `gh release create --generate-notes` can walk
          # commits between the previous tag and this release.
          fetch-depth: 0

      - name: Derive release metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: echo "TAG=v${INPUT_VERSION}" >> "$GITHUB_ENV"

      # mise pins the JDK, Gradle bootstrap binary, gh, and python (see
      # /mise.toml). setup-gradle below is layered on top purely for its
      # build / dependency cache.
      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Pinned at v5 rather than v6: v6 moved caching to a commercially-
      # licensed component. v5 keeps the freely-licensed caching and runs
      # on Node 24. See .github/workflows/ci.yml for the full rationale.
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      # Build the KMMBridge-consumable XCFramework (CLAUDE.md §9). KMMBridge
      # itself isn't fully wired in v1; that lands when we cut 0.2.0 with
      # Maven publish. For now we ship the XCFramework as a GitHub Release
      # asset so iOS / macOS consumers can drop it in directly. The CI
      # version stamp is passed through to Gradle via ORG_GRADLE_PROJECT_version
      # — the standard env-var form of `-Pversion=…` so `mise run xcframework`
      # doesn't need to know CI is the caller.
      - name: Build release artifacts
        env:
          ORG_GRADLE_PROJECT_version: ${{ inputs.version }}
        run: mise run xcframework

      # Zip the XCFramework so GitHub Releases serves a single file. Consumers
      # unzip and consume the resulting Backgrounder.xcframework directly.
      - name: Package XCFramework
        run: |
          cd backgrounder/build/XCFrameworks/release
          zip -ry "Backgrounder-${{ inputs.version }}.xcframework.zip" Backgrounder.xcframework

      - name: Compute archive checksums
        run: |
          cd backgrounder/build/XCFrameworks/release
          shasum -a 256 Backgrounder-*.xcframework.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create and push tag
        env:
          TAG: ${{ env.TAG }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag -a "$TAG" -m "Release $TAG"
          fi
          if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on origin."
          else
            git push origin "$TAG"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backgrounder-release-${{ env.TAG }}
          path: |
            backgrounder/build/XCFrameworks/release/Backgrounder-*.xcframework.zip
            backgrounder/build/XCFrameworks/release/SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.TAG }}
          NOTES: ${{ inputs.notes }}
        run: |
          ASSETS=(backgrounder/build/XCFrameworks/release/Backgrounder-*.xcframework.zip
                  backgrounder/build/XCFrameworks/release/SHA256SUMS.txt)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          elif [[ -n "$NOTES" ]]; then
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --generate-notes
          fi
