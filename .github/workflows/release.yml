name: Release

# Maven Central is the only active distribution channel. The previous
# XCFramework-zip / GitHub Release pipeline was removed — see git history
# if you need to restore an SPM-side delivery story for non-KMP iOS / macOS
# consumers.
#
# The runner picks `bumpType` (patch / minor / major); the workflow computes
# the actual version from the latest GitHub Release. The chosen component
# is incremented and every component below it resets to zero — standard
# semver. Runners never type a version number; they only choose the axis.
#
# Examples (latest release = v0.3.7):
#   bumpType=patch                             → 0.3.8
#   bumpType=minor                             → 0.4.0
#   bumpType=major                             → 1.0.0
#   bumpType=patch + versionSuffix=beta        → 0.3.8-beta
#   bumpType=minor + versionSuffix=rc.1        → 0.4.0-rc.1
#   bumpType=major + versionSuffix=preview     → 1.0.0-preview
#
# The optional `versionSuffix` input adds a SemVer pre-release identifier
# (`MAJOR.MINOR.PATCH-SUFFIX`). Pre-release versions sort before their
# corresponding final release in semver — `0.4.0-rc.1` is older than
# `0.4.0`. The suffix is validated against the SemVer 2.0 grammar before
# anything is published.
#
# `dryRun` defaults to `true` because Maven Central releases are
# **irreversible** — Sonatype never deletes a published artifact. The dry
# run uploads to the Central Portal staging area only and stops there,
# so the artifact set can be reviewed on https://central.sonatype.com/
# before manually clicking Publish (or Drop). Flip the input to `false`
# to publish + auto-release in one step.
on:
  workflow_dispatch:
    inputs:
      bumpType:
        description: Which semver component to bump from the latest release
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      versionSuffix:
        description: Optional pre-release suffix appended after a dash (e.g. beta, preview, rc.1)
        required: false
        type: string
        default: ""
      dryRun:
        description: Upload to Central staging only; do not auto-release. Default true.
        required: true
        type: boolean
        default: true

# `contents: write` lets the workflow push the version tag and create the
# GitHub Release after a successful Maven Central publish. Tagging happens
# only on `dryRun=false` — see "Tag + create GitHub Release" step.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    # The four MAVEN_CENTRAL_* secrets live on the `continuous-deployment`
    # GitHub environment, not the repository scope. Without this binding
    # `secrets.MAVEN_CENTRAL_*` resolves to the empty string at runtime
    # and vanniktech fails with cryptic auth / signing errors that look
    # like a credentials problem in the downstream tool.
    environment: continuous-deployment

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Full history so `gh release create --generate-notes` can walk
          # commits between the previous tag and this release.
          fetch-depth: 0

      # Compute the version up front so every downstream step references
      # the same value. The version is derived from the latest GitHub
      # Release: `bumpType` picks which component to increment, and every
      # component below it resets to zero — standard semver.
      #
      #   latest 0.9.0  + bumpType=patch  → 0.9.1
      #   latest 0.9.3  + bumpType=minor  → 0.10.0
      #   latest 0.9.3  + bumpType=major  → 1.0.0
      #
      # Because a re-run computes the *same* version (no run-number in the
      # patch any more), the "Verify version not already published" step
      # and the tag-exists guard are what catch an accidental repeat.
      #
      # First-release fallback: if no previous release exists yet, the base
      # is 0.0.0, so bumpType patch/minor/major yields 0.0.1 / 0.1.0 / 1.0.0.
      - name: Compute release version
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP_TYPE: ${{ inputs.bumpType }}
          VERSION_SUFFIX: ${{ inputs.versionSuffix }}
        run: |
          set -euo pipefail

          # Latest tag, or empty if there are no releases yet.
          LATEST=$(gh release view --json tagName -q .tagName 2>/dev/null || true)

          if [[ -n "$LATEST" ]]; then
            # Strip the leading `v` and any pre-release suffix (e.g.
            # v0.3.7-beta → 0.3.7) before parsing — we always bump from
            # the numeric core, not from a previous pre-release suffix.
            BASE=${LATEST#v}
            BASE=${BASE%%-*}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          else
            echo "No previous release found; starting from 0.0.0 base."
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          # Each bump increments its own component and zeroes everything
          # below it — standard semver. `patch` from 0.9.0 → 0.9.1,
          # `minor` from 0.9.3 → 0.10.0, `major` from 0.9.3 → 1.0.0.
          case "$BUMP_TYPE" in
            patch)
              NEW_MAJOR=$MAJOR
              NEW_MINOR=$MINOR
              NEW_PATCH=$((PATCH + 1))
              ;;
            minor)
              NEW_MAJOR=$MAJOR
              NEW_MINOR=$((MINOR + 1))
              NEW_PATCH=0
              ;;
            major)
              NEW_MAJOR=$((MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=0
              ;;
            *)
              echo "::error::Unknown bumpType: $BUMP_TYPE"
              exit 1
              ;;
          esac

          RELEASE_VERSION="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"

          # Optional pre-release suffix. Validate against the SemVer 2.0
          # pre-release identifier grammar: dot-separated alphanumerics and
          # hyphens, each segment non-empty and not all leading zeros if
          # purely numeric. The regex below covers the common cases
          # (beta, preview, rc.1, alpha.2.fix) and rejects whitespace,
          # leading dashes, uppercase (which Maven Central treats as a
          # version-comparison foot-gun).
          if [[ -n "$VERSION_SUFFIX" ]]; then
            # Each dot-separated segment must start with an alphanumeric
            # character. Hyphens are allowed inside a segment but not at
            # its start — otherwise `0.3.42-` + `-beta` produces `0.3.42--beta`,
            # which version-comparators handle inconsistently.
            if [[ ! "$VERSION_SUFFIX" =~ ^[0-9a-z][0-9a-z-]*(\.[0-9a-z][0-9a-z-]*)*$ ]]; then
              echo "::error::versionSuffix '$VERSION_SUFFIX' is not a valid SemVer pre-release identifier."
              echo "::error::Allowed: dot-separated lowercase alphanumeric segments (hyphens permitted inside a segment). Examples: beta, preview, rc.1, alpha.2.fix."
              exit 1
            fi
            RELEASE_VERSION="${RELEASE_VERSION}-${VERSION_SUFFIX}"
          fi

          RELEASE_TAG="v${RELEASE_VERSION}"

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

          # Surface the computed version in the run-page summary so the
          # runner can see it before the irreversible publish step fires.
          # If something looks wrong, cancel the run from the Actions UI.
          {
            echo "## Release plan"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Previous release | \`${LATEST:-(none)}\` |"
            echo "| Bump type | \`${BUMP_TYPE}\` |"
            echo "| Suffix | \`${VERSION_SUFFIX:-(none)}\` |"
            echo "| **Computed version** | **\`${RELEASE_VERSION}\`** |"
            echo "| Tag | \`${RELEASE_TAG}\` |"
            echo "| Dry run? | \`${{ inputs.dryRun }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Computed release version: $RELEASE_VERSION"

      # Belt-and-suspenders safety check: fail before any publish if the
      # computed version is already on Maven Central. Sonatype rejects
      # re-uploads with a confusing "staging failed" error; surfacing the
      # collision here gives a clear "this version is already published"
      # message and saves a few minutes of build time on a doomed run.
      #
      # Checks every module that ships under com.happycodelucky.backgrounder.
      # Add artifact ids to the loop when new publishable modules land (e.g.
      # a future `:backgrounder-testing` companion — just append the artifact
      # id and the next release picks it up automatically). The grep is
      # exact-match for `<version>X.Y.Z</version>` to avoid substring matches
      # (e.g. version 0.3.1 matching 0.3.10).
      - name: Verify version not already published
        run: |
          set -euo pipefail
          ESCAPED="${RELEASE_VERSION//./\\.}"
          for ARTIFACT in backgrounder; do
            METADATA_URL="https://repo1.maven.org/maven2/com/happycodelucky/backgrounder/${ARTIFACT}/maven-metadata.xml"
            if curl -sf "$METADATA_URL" 2>/dev/null | grep -qE "<version>${ESCAPED}</version>"; then
              echo "::error::Version $RELEASE_VERSION is already published as com.happycodelucky.backgrounder:${ARTIFACT} on Maven Central."
              echo "::error::Maven Central refuses to overwrite published artifacts. Cut a new release with a higher bumpType, or set versionSuffix for a pre-release."
              exit 1
            fi
          done
          echo "Version $RELEASE_VERSION is not yet on Maven Central — safe to publish."

      # mise pins JDK, gradle, etc. (see /mise.toml). setup-gradle below is
      # layered on top solely for its build / dependency cache.
      - name: Set up mise toolchain
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Pinned at v5 rather than v6: v6 moved caching to a commercially-
      # licensed component. v5 keeps the freely-licensed caching and runs
      # on Node 24. See .github/workflows/ci.yml for the full rationale.
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      # Vanniktech `mavenPublishing { }` exposes two umbrella tasks (see
      # backgrounder/build.gradle.kts). The "stops at staging" behaviour of
      # the dry-run task is contingent on `automaticRelease = false` in
      # each module's `mavenPublishing { }` config — if that ever flips
      # back to `true` in any module the dry run silently becomes a real
      # publish for that module. See the comments on
      # `publishToMavenCentral(automaticRelease = …)` in
      # backgrounder/build.gradle.kts.
      #
      #   * publishToMavenCentral             — build + sign + upload to
      #     Central staging. STOPS before the irreversible "release" step.
      #     Used for dry runs; review the staged deployment on
      #     https://central.sonatype.com/ before manually publishing.
      #
      #   * publishAndReleaseToMavenCentral   — full pipeline. Uploads,
      #     closes the deployment, and releases it to public Maven Central.
      #     Cannot be undone. Used only when `dryRun=false`.
      #
      # The Gradle invocation is *not* scoped to a specific module
      # (no `:backgrounder:` prefix) — that way it runs across every module
      # that declares a `mavenPublishing { }` block. Currently that's
      # `:backgrounder`. Adding a new publishable module is free: declare the
      # block and the next release picks it up.
      #
      # Both tasks publish every publication the KMP plugin registered
      # (Android AAR, kotlinMultiplatform metadata, iosArm64,
      # iosSimulatorArm64, macosArm64 klibs) plus their sources / javadoc
      # jars and detached GPG signatures. Snapshot versions (anything
      # ending in `-SNAPSHOT`) auto-route to the Central Portal snapshots
      # endpoint.
      - name: Publish to Maven Central (dry run — staging only)
        if: ${{ inputs.dryRun }}
        env:
          # Vanniktech reads these four properties; Gradle auto-populates
          # them from ORG_GRADLE_PROJECT_* env vars. See docs/publishing.md.
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # In-memory GPG key: paste the full ASCII-armoured private key
          # block (`-----BEGIN PGP PRIVATE KEY BLOCK-----` … `-----END PGP
          # PRIVATE KEY BLOCK-----`) into the GitHub secret. No keyring on
          # the runner; vanniktech imports the key in-process.
          ORG_GRADLE_PROJECT_signingInMemoryKey:         ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew publishToMavenCentral \
            -Pversion=$RELEASE_VERSION --no-daemon

      - name: Publish to Maven Central (release — IRREVERSIBLE)
        if: ${{ !inputs.dryRun }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername:       ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword:       ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey:         ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew publishAndReleaseToMavenCentral \
            -Pversion=$RELEASE_VERSION --no-daemon

      # Only tag + create a GitHub Release on a real publish, not a dry run.
      # The tag must point at the commit that produced the published artifact,
      # so this step runs *after* the Maven Central publish succeeds. If
      # publish fails the job aborts before we get here; no orphan tag is
      # created.
      #
      # `gh release create --generate-notes` uses GitHub's auto-generated
      # release notes (commits since the previous tag, grouped). The shields.io
      # `Release` badge on the README points at /releases/latest and updates
      # within seconds of this step finishing.
      - name: Tag and create GitHub Release
        if: ${{ !inputs.dryRun }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists locally; skipping creation."
          else
            git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; skipping creation."
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi

      - name: Summary
        run: |
          if [[ "${{ inputs.dryRun }}" == "true" ]]; then
            echo "Dry run complete. Review the staged deployment at:"
            echo "   https://central.sonatype.com/publishing/deployments"
            echo "   Click 'Publish' to release $RELEASE_VERSION, or 'Drop' to discard."
          else
            echo "Released com.happycodelucky.backgrounder:backgrounder:$RELEASE_VERSION to Maven Central."
            echo "   Maven Central: https://central.sonatype.com/artifact/com.happycodelucky.backgrounder/backgrounder/$RELEASE_VERSION"
            echo "   GitHub Release: https://github.com/happycodelucky/backgrounder/releases/tag/$RELEASE_TAG"
            echo "   Note: Maven Central indexing can take up to ~30 min to appear in https://repo1.maven.org/maven2/."
          fi
